version: 2
updates:
  # Root package (the GitHub Action)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-deps:
        patterns:
          - "@actions/*"
      dev-deps:
        dependency-type: "development"

  # Website package
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
    groups:
      ui-deps:
        patterns:
          - "@radix-ui/*"
          - "lucide-react"
          - "recharts"
      dev-deps:
        dependency-type: "development"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
